name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend and frontend run in parallel via shared reusable workflows.
  backend:
    uses: sneat-co/cicd/.github/workflows/go-ci.yml@main
    with:
      working-directory: backend

  frontend:
    uses: sneat-co/cicd/.github/workflows/nx-ci.yml@main
    with:
      working-directory: frontend
      targets: "lint test build"

  # TODO: re-enable the e2e job once the standalone app's e2e project
  # (frontend/apps/contactus-app-e2e) is scaffolded. It is referenced here but
  # does not exist yet, so the job could never pass.
